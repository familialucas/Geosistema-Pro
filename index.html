<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoSistema PRO - Importação Rover</title>
     <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">

    <!-- iPhone -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #map { height: 450px; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; z-index: 1; }
        .controles { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; background: #e9ecef; padding: 15px; border-radius: 8px; }
        button { padding: 12px 18px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-import { background: #007bff; } .btn-poly { background: #28a745; } .btn-nav { background: #17a2b8; }
        .resultados { display: flex; gap: 25px; margin: 15px 0; padding: 12px; background: #d4edda; border-left: 4px solid #28a745; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }
        th { background: #007bff; color: white; }
        .label-medida { background: white; border: 1px solid red; border-radius: 3px; padding: 2px 4px; font-size: 11px; font-weight: bold; color: red; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Geoprocessamento Rover GNSS</h2>
        <div class="controles">
            <input type="file" id="arquivoGNSS">
            <button onclick="importarDados()" class="btn-import">1. Carregar Rover</button>
            <button onclick="gerarPoligonal()" class="btn-poly">2. Desenhar Poligonal</button>
            <button onclick="enviarParaMemorial()" class="btn-nav">3. Relatório Completo →</button>
        </div>
        <div class="resultados">
            <span>Área: <span id="area">0</span> m²</span>
            <span>Perímetro: <span id="perimetro">0</span> m</span>
        </div>
        <div id="map"></div>
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" onclick="selecionarTodos(this)"></th>
                    <th>Ponto</th>
                    <th>Lat (DMS)</th>
                    <th>Lon (DMS)</th>
                    <th>Elev (m)</th>
                    <th>Precisão H (m)</th>
                    <th>Solução</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
